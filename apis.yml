aid: mxml
name: MXML
description: >-
  MXML (Magic XML) is a declarative XML-based markup language used in Adobe
  Flex for creating user interfaces and applications, allowing developers to
  define UI components and layouts in an XML format. It is a UI markup
  language, not a network API.
